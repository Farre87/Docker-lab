version: '3.8'

services:

  webserver:
    build: ./webserver
    container_name: webserver
    ports:
      - "8080:80"
    depends_on:
      - database
    restart: always

  database:
    build: ./database
    container_name: database
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: devops_db
      POSTGRES_USER: devops_user
      POSTGRES_PASSWORD: devops123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
